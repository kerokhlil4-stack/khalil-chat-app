<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHALIL | إكمال البيانات</title>
    <style>
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .profile-card { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 30px; 
            border-radius: 25px; 
            text-align: center; 
            border: 1px solid rgba(168, 85, 247, 0.3); 
            width: 90%; 
            max-width: 400px; 
            backdrop-filter: blur(10px); 
        }
        
        .avatar-upload { position: relative; max-width: 125px; margin: 0 auto 20px; }
        .avatar-edit { position: absolute; right: 12px; z-index: 1; bottom: 10px; }
        .avatar-edit input { display: none; }
        .avatar-edit label { 
            display: inline-block; 
            width: 34px; 
            height: 34px; 
            border-radius: 100%; 
            background: #a855f7; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.2);
        }
        .avatar-edit label:after { content: "+"; font-size: 20px; color: white; }
        
        .avatar-preview { 
            width: 120px; 
            height: 120px; 
            border-radius: 100%; 
            border: 3px solid #a855f7; 
            overflow: hidden;
        }
        #imagePreview { 
            width: 100%; 
            height: 100%; 
            background-size: cover; 
            background-position: center; 
        }

        h2 { color: #a855f7; margin-bottom: 20px; }
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            background: #111; 
            color: white; 
            box-sizing: border-box; 
            text-align: center; 
        }
        .btn-save { 
            background: #a855f7; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            width: 100%; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn-save:disabled { background: #444; opacity: 0.7; }
        .status { font-size: 14px; margin-top: 10px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-upload">
            <div class="avatar-edit">
                <input type='file' id="imageUpload" accept=".png, .jpg, .jpeg" />
                <label for="imageUpload"></label>
            </div>
            <div class="avatar-preview">
                <div id="imagePreview" style="background-image: url('https://via.placeholder.com/150');"></div>
            </div>
        </div>
        
        <h2>إكمال البيانات</h2>
        <input type="text" id="nameInput" placeholder="اكتب لقبك هنا">
        <p class="status" id="statusMsg">جاري التحقق من الدخول...</p>
        <button class="btn-save" id="saveBtn">حفظ والدخول للموقع</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDacUhyXuuwecM7_WvukjiDl3gLlk75zAs",
            authDomain: "khalil-app-861c8.firebaseapp.com",
            projectId: "khalil-app-861c8",
            storageBucket: "khalil-app-861c8.firebasestorage.app",
            messagingSenderId: "1080158981516",
            appId: "1:1080158981516:web:93bcd420b79dcd6d151aa9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const nameInput = document.getElementById('nameInput');
        const imagePreview = document.getElementById('imagePreview');
        const imageUpload = document.getElementById('imageUpload');
        const saveBtn = document.getElementById('saveBtn');
        const statusMsg = document.getElementById('statusMsg');

        let currentUser = null;
        let selectedImageFile = null; // تخزين الملف بدل base64

        async function uploadImage(file, userId) {
            const imageRef = ref(storage, `profile_images/${userId}.jpg`);
            await uploadString(imageRef, file, 'data_url');
            return await getDownloadURL(imageRef);
        }

        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400;
                        const MAX_HEIGHT = 400;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = reject;
                    img.src = event.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                // جلب البيانات الموجودة إن وجدت
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    nameInput.value = data.name || "";
                    if (data.photo) {
                        imagePreview.style.backgroundImage = `url(${data.photo})`;
                    }
                } else {
                    nameInput.value = user.displayName || "";
                    if (user.photoURL) {
                        imagePreview.style.backgroundImage = `url(${user.photoURL})`;
                    }
                }
                
                statusMsg.innerText = "يمكنك تعديل بياناتك";
            } else {
                window.location.assign("login.html");
            }
        });

        imageUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                statusMsg.innerText = "جاري معالجة الصورة...";
                try {
                    const compressed = await compressImage(file);
                    selectedImageFile = compressed;
                    imagePreview.style.backgroundImage = `url(${compressed})`;
                    statusMsg.innerText = "تم تجهيز الصورة بنجاح";
                } catch (error) {
                    console.error(error);
                    statusMsg.innerText = "فشل معالجة الصورة";
                }
            }
        });

        saveBtn.addEventListener('click', async () => {
            if (!currentUser) return;
            
            const nickname = nameInput.value.trim();
            if (nickname.length < 2) {
                alert("برجاء كتابة لقب صحيح");
                return;
            }

            statusMsg.innerText = "جاري حفظ بياناتك...";
            saveBtn.disabled = true;

            try {
                let photoURL = "";
                
                if (selectedImageFile) {
                    statusMsg.innerText = "جاري رفع الصورة...";
                    photoURL = await uploadImage(selectedImageFile, currentUser.uid);
                } else {
                    // الاحتفاظ بالصورة القديمة أو صورة جوجل
                    const userDoc = await getDoc(doc(db, "users", currentUser.uid));
                    photoURL = userDoc.exists() ? userDoc.data().photo : (currentUser.photoURL || "https://via.placeholder.com/150");
                }

                await setDoc(doc(db, "users", currentUser.uid), {
                    uid: currentUser.uid,
                    name: nickname,
                    photo: photoURL,
                    lowerName: nickname.toLowerCase(),
                    profileCompleted: true,
                    lastLogin: new Date()
                }, { merge: true });

                statusMsg.innerText = "تم الحفظ بنجاح! جاري التحويل...";
                setTimeout(() => {
                    window.location.assign("home.html");
                }, 1000);
            } catch (error) {
                console.error(error);
                alert("حدث خطأ أثناء الحفظ: " + error.message);
                saveBtn.disabled = false;
                statusMsg.innerText = "فشل الحفظ، حاول مرة أخرى";
            }
        });
    </script>
</body>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyDacUhyXuuwecM7_WvukjiDl3gLlk75zAs",
            authDomain: "khalil-app-861c8.firebaseapp.com",
            projectId: "khalil-app-861c8",
            storageBucket: "khalil-app-861c8.firebasestorage.app",
            messagingSenderId: "1080158981516",
            appId: "1:1080158981516:web:93bcd420b79dcd6d151aa9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const nameInput = document.getElementById('nameInput');
        const imagePreview = document.getElementById('imagePreview');
        const imageUpload = document.getElementById('imageUpload');
        const saveBtn = document.getElementById('saveBtn');
        const statusMsg = document.getElementById('statusMsg');

        let currentUser = null;
        let selectedImageBase64 = null;

        // 1. مراقبة حالة الدخول
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                nameInput.value = user.displayName || "";
                imagePreview.style.backgroundImage = `url(${user.photoURL})`;
                selectedImageBase64 = user.photoURL; 
                statusMsg.innerText = "بيانات جوجل جاهزة، يمكنك التعديل";
            } else {
                window.location.assign("login.html");
            }
        });

        // 2. وظيفة ضغط الصورة (لحل مشكلة الحجم الكبير)
        function compressImage(base64Str) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; // تصغير العرض لـ 400 بكسل
                    const MAX_HEIGHT = 400;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    // تحويل الصورة لـ JPEG بجودة 70% لتقليل المساحة
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                };
            });
        }

        // 3. اختيار صورة جديدة
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (event) => {
                    statusMsg.innerText = "جاري معالجة الصورة...";
                    selectedImageBase64 = await compressImage(event.target.result);
                    imagePreview.style.backgroundImage = `url(${selectedImageBase64})`;
                    statusMsg.innerText = "تم تجهيز الصورة بنجاح";
                };
                reader.readAsDataURL(file);
            }
        });

        // 4. الحفظ النهائي والدخول
        saveBtn.addEventListener('click', async () => {
            if (!currentUser) return;
            
            const nickname = nameInput.value.trim();
            if (nickname.length < 2) {
                alert("برجاء كتابة لقب صحيح");
                return;
            }

            statusMsg.innerText = "جاري حفظ بياناتك والدخول...";
            saveBtn.disabled = true;

            try {
                // حفظ البيانات في Firestore (بما في ذلك حالة الإكمال)
                await setDoc(doc(db, "users", currentUser.uid), {
                    uid: currentUser.uid,
                    name: nickname,
                    photo: selectedImageBase64, 
                    profileCompleted: true, // عشان الموقع يفتكرك المرة الجاية
                    lastLogin: new Date()
                }, { merge: true });

                window.location.assign("home.html");
            } catch (error) {
                console.error(error);
                alert("حدث خطأ أثناء الحفظ: " + error.message);
                saveBtn.disabled = false;
                statusMsg.innerText = "فشل الحفظ، حاول مرة أخرى";
            }
        });
    </script>
</body>
</html>
