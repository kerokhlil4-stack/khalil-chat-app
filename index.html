<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHALIL | تسجيل الدخول</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050505; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .main-container {
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .brand-name {
            font-size: 5rem;
            color: #fff;
            letter-spacing: 8px;
            text-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7, 0 0 40px #a855f7;
            margin-bottom: 30px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 400px;
            margin: 0 auto;
        }

        .login-box h2 {
            color: #fff;
            margin-bottom: 10px;
        }

        .login-box p {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* تعديل زرار جوجل ليكون رابط */
        .google-btn {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: white;
            color: #000;
            font-size: 1rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none; /* عشان ده بقى رابط */
        }

        .google-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4);
        }

        .google-btn i {
            font-size: 1.2rem;
            color: #ea4335;
        }

        @media (max-width: 480px) {
            .brand-name { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="brand-name">KHALIL</h1>

        <div class="login-box">
            <h2>مرحباً بك في عالمك</h2>
            <p>تواصل مع أصدقائك بأسلوب مختلف</p>

            <a href="login.html" class="google-btn">
                <i class="fa-brands fa-google"></i>
                <span>التسجيل عبر جوجل</span>
            </a>
        </div>
    </div>

    <script>
        console.log("Welcome to KHALIL App");
    </script>

</body>
</html>
