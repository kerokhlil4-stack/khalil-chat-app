<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHALIL | الدردشة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            padding-bottom: 80px; 
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid #1a1a1a;
        }
        .logo { color: #a855f7; font-weight: bold; font-size: 24px; letter-spacing: 2px; }
        .search-top-btn { color: #94a3b8; font-size: 20px; cursor: pointer; }

        .user-bar {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #0a0a0a;
            margin-bottom: 10px;
        }
        .user-bar img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #a855f7; object-fit: cover; }
        .user-bar span { margin-right: 12px; font-weight: 500; font-size: 18px; }

        .chat-list { padding: 10px; }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
            cursor: pointer;
        }
        .chat-item:active { transform: scale(0.98); background: rgba(168, 85, 247, 0.1); }
        .chat-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; margin-left: 15px; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; margin-bottom: 4px; color: #f1f5f9; }
        .chat-msg { font-size: 13px; color: #94a3b8; }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #1a1a1a;
        }
        .nav-btn { background: none; border: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .nav-btn.active { color: #a855f7; }
        .nav-btn i { font-size: 20px; }
        .nav-btn span { font-size: 11px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">KHALIL</div>
        <div class="search-top-btn" onclick="window.location.assign('search.html')">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <div class="user-bar">
        <img id="userImg" src="https://via.placeholder.com/150" alt="" onerror="this.src='https://via.placeholder.com/150'">
        <span id="userName">جاري التحميل...</span>
    </div>

    <div class="chat-list" id="chatList">
        <p style='text-align:center; color:#444; margin-top:20px;'>جاري تحميل المحادثات...</p>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active">
            <i class="fas fa-comment-dots"></i>
            <span>المحادثات</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDacUhyXuuwecM7_WvukjiDl3gLlk75zAs",
            authDomain: "khalil-app-861c8.firebaseapp.com",
            projectId: "khalil-app-861c8",
            storageBucket: "khalil-app-861c8.firebasestorage.app",
            messagingSenderId: "1080158981516",
            appId: "1:1080158981516:web:93bcd420b79dcd6d151aa9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const chatList = document.getElementById('chatList');
        let friendsCache = new Map(); // تخزين مؤقت لبيانات الأصدقاء

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // عرض بيانات المستخدم
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    document.getElementById('userName').innerText = userSnap.data().name;
                    document.getElementById('userImg').src = userSnap.data().photo;
                }

                // الاستعلام عن المحادثات المقبولة فقط
                const q = query(
                    collection(db, "chats"), 
                    where("participants", "array-contains", user.uid),
                    where("status", "==", "accepted")
                );

                onSnapshot(q, async (snapshot) => {
                    if (snapshot.empty) {
                        chatList.innerHTML = "<p style='text-align:center; color:#444; margin-top:20px;'>لا توجد محادثات نشطة حالياً<br>اذهب لإضافة أصدقاء</p>";
                        return;
                    }

                    // جمع IDs الأصدقاء دفعة واحدة
                    const friendIds = [];
                    const chatDataMap = new Map();
                    
                    snapshot.forEach((chatDoc) => {
                        const chatData = chatDoc.data();
                        const otherId = chatData.participants.find(id => id !== user.uid);
                        if (otherId) {
                            friendIds.push(otherId);
                            chatDataMap.set(otherId, chatDoc.id);
                        }
                    });

                    // جلب بيانات الأصدقاء دفعة واحدة (إذا كان العدد أقل من 10)
                    // ملاحظة: Firestore لا يدعم "in" لأكثر من 10 عناصر
                    chatList.innerHTML = '<p style="text-align:center; color:#888;">جاري تحميل المحادثات...</p>';
                    
                    const friendsData = [];
                    for (const friendId of friendIds.slice(0, 10)) {
                        if (friendsCache.has(friendId)) {
                            friendsData.push({ id: friendId, data: friendsCache.get(friendId) });
                        } else {
                            const friendSnap = await getDoc(doc(db, "users", friendId));
                            if (friendSnap.exists()) {
                                const friendData = friendSnap.data();
                                friendsCache.set(friendId, friendData);
                                friendsData.push({ id: friendId, data: friendData });
                            }
                        }
                    }

                    // عرض القائمة
                    chatList.innerHTML = "";
                    friendsData.forEach(friend => {
                        const chatId = chatDataMap.get(friend.id);
                        const item = document.createElement('div');
                        item.className = 'chat-item';
                        item.onclick = () => {
                            window.location.assign(`chat.html?id=${friend.id}`);
                        };
                        item.innerHTML = `
                            <img src="${friend.data.photo}" class="chat-img" onerror="this.src='https://via.placeholder.com/150'">
                            <div class="chat-info">
                                <div class="chat-name">${friend.data.name}</div>
                                <div class="chat-msg">اضغط لبدء الدردشة...</div>
                            </div>
                        `;
                        chatList.appendChild(item);
                    });

                    if (friendIds.length > 10) {
                        const more = document.createElement('p');
                        more.style.textAlign = 'center';
                        more.style.color = '#666';
                        more.style.marginTop = '10px';
                        more.innerText = `+${friendIds.length - 10} محادثة أخرى`;
                        chatList.appendChild(more);
                    }
                });
            } else {
                window.location.assign("index.html");
            }
        });
    </script>
</body>
</html>
